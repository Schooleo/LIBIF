name: Web CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'docker/web.Dockerfile'
      - '.dockerignore'
      - '.env.example'
      - 'package.json'
      - 'package-lock.json'
      - '.github/scripts/npm-ci-with-retry.sh'
      - '.github/workflows/web-ci.yml'
  push:
    branches: [main, dev]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'docker/web.Dockerfile'
      - '.dockerignore'
      - '.env.example'
      - 'package.json'
      - 'package-lock.json'
      - '.github/scripts/npm-ci-with-retry.sh'
      - '.github/workflows/web-ci.yml'

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Build web
        run: npm run build -w apps/web

  test:
    name: Test web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Run web tests
        run: npm test -w apps/web

  publish-dev:
    name: Publish web integration image
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/libif-web
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
