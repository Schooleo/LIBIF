name: API CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'docker/api.Dockerfile'
      - '.dockerignore'
      - '.env.example'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/scripts/npm-ci-with-retry.sh'
      - '.github/workflows/api-ci.yml'
  push:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'docker/api.Dockerfile'
      - '.dockerignore'
      - '.env.example'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/scripts/npm-ci-with-retry.sh'
      - '.github/workflows/api-ci.yml'

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Build API
        run: npm run build -w apps/api

  test:
    name: Test API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PDF and image tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils imagemagick

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run API tests
        run: npm test -w apps/api

  worker-integration:
    name: Worker integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Poppler PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Start worker infrastructure
        run: docker compose up --detach --wait

      - name: Run worker integration gate
        run: npm run test:worker

  publish-dev:
    name: Publish API integration image
    needs: [build, test, worker-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/libif-api
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
