name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Build workspaces
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Poppler and ImageMagick tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils imagemagick

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run tests
        run: npm test

  worker-integration:
    name: Worker integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Poppler PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils

      - name: Install dependencies
        run: .github/scripts/npm-ci-with-retry.sh

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Start worker infrastructure
        run: docker compose up --detach --wait

      - name: Run worker integration gate
        run: npm run test:worker
