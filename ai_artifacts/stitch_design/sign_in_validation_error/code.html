<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LIBIF - Sign In Error</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        body { background-color: #F7F9F8; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>

<body class="h-full flex flex-col items-center justify-center font-sans antialiased text-on-surface">
<!-- Main Container -->
<main class="w-full max-w-[480px] px-lg py-xl">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-xl">
<span class="material-symbols-outlined text-[48px] text-primary-container mb-sm" data-icon="local_library">local_library</span>
<h1 class="font-display-lg text-display-lg text-primary-container">LIBIF</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Institutional Digital Library System</p>
</div>
<!-- Error Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-xl shadow-[0px_4px_12px_rgba(16,60,53,0.08)]">
<h2 class="font-headline-md text-headline-md text-primary-container mb-lg">Institutional Sign In</h2>
<!-- Global Error Alert -->
<div aria-live="assertive" class="bg-error-container border border-error rounded-DEFAULT p-md mb-lg flex items-start gap-md" role="alert">
<span class="material-symbols-outlined text-error shrink-0" data-icon="error">error</span>
<div class="flex flex-col">
<span class="font-title-sm text-title-sm text-on-error-container mb-xs">Sign In Failed</span>
<span class="font-body-sm text-body-sm text-on-error-container">Invalid credentials or locked account. Please try again or contact the help desk.</span>
</div>
</div>
<!-- Sign In Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Institutional ID Field -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface mb-xs" for="institutional_id">Institutional ID or Email</label>
<input aria-invalid="false" class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" id="institutional_id" name="institutional_id" type="text" value="jdoe@university.edu"/>
</div>
<!-- Password Field (Error State) -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface mb-xs" for="password">Passphrase</label>
<div class="relative">
<input aria-describedby="password-error" aria-invalid="true" class="w-full bg-error-container/20 border-2 border-error rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-error/20 transition-all pr-[40px]" id="password" name="password" type="password" value="********"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-error" data-icon="warning">warning</span>
</div>
<p class="font-body-sm text-body-sm text-error mt-xs flex items-center gap-xs" id="password-error">
                        The passphrase entered is incorrect.
                    </p>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-sm block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember for 30 days
                        </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm font-semibold text-secondary hover:text-primary-container hover:underline transition-colors" href="#">
                            Forgot passphrase?
                        </a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-sm px-md border border-transparent rounded-DEFAULT shadow-sm font-title-sm text-title-sm text-on-primary bg-primary-container hover:bg-[#138A8A] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors" type="submit">
                        Sign In to Library
                    </button>
</div>
</form>
<div class="mt-lg border-t border-outline-variant pt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Need help? <a class="font-semibold text-secondary hover:underline" href="#">Contact Institutional Help Desk</a>
</p>
</div>
</div>
</main>
</body></html>
