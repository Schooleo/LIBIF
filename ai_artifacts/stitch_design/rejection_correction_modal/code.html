<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rejection / Correction Modal - KnowledgeArchive</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f9f9ff",
                        "on-secondary-fixed": "#002021",
                        "tertiary-fixed": "#91f3f2",
                        "primary": "#002520",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-container": "#7ca79d",
                        "inverse-surface": "#2a313d",
                        "surface-tint": "#3d665e",
                        "secondary": "#12696b",
                        "tertiary": "#002525",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#414846",
                        "on-surface": "#151c27",
                        "on-tertiary-fixed-variant": "#004f50",
                        "on-primary-fixed": "#00201b",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d3daea",
                        "inverse-on-surface": "#ebf1ff",
                        "outline": "#717976",
                        "error": "#ba1a1a",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#dce2f3",
                        "secondary-fixed": "#a5eff1",
                        "on-error": "#ffffff",
                        "surface-container": "#e7eefe",
                        "surface": "#f9f9ff",
                        "on-primary-fixed-variant": "#244e46",
                        "on-background": "#151c27",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#002020",
                        "tertiary-container": "#003c3c",
                        "primary-fixed-dim": "#a4cfc5",
                        "primary-container": "#103c35",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#bfece1",
                        "on-primary": "#ffffff",
                        "surface-variant": "#dce2f3",
                        "outline-variant": "#c0c8c5",
                        "on-secondary-container": "#1a6d6f",
                        "on-secondary-fixed-variant": "#004f51",
                        "inverse-primary": "#a4cfc5",
                        "secondary-fixed-dim": "#89d3d5",
                        "on-tertiary-container": "#47adac",
                        "surface-container-high": "#e2e8f8",
                        "tertiary-fixed-dim": "#74d6d6",
                        "secondary-container": "#a2edee"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "unit": "8px",
                        "xl": "32px",
                        "container-max": "1440px",
                        "sm": "8px",
                        "md": "16px",
                        "gutter": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Be Vietnam Pro"],
                        "body-sm": ["Be Vietnam Pro"],
                        "label-caps": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "title-sm": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased overflow-hidden">
<!-- Mock Background for Context (Approval Review Screen) -->
<div class="h-screen w-full flex bg-surface-container-low opacity-40 blur-sm pointer-events-none absolute inset-0 z-0">
<!-- Sidebar placeholder -->
<div class="w-64 bg-primary h-full border-r border-outline-variant hidden md:block"></div>
<!-- Main content placeholder -->
<div class="flex-1 flex flex-col">
<div class="h-16 border-b border-outline-variant bg-surface w-full"></div>
<div class="flex-1 p-lg flex gap-lg">
<div class="flex-1 bg-surface-container-lowest border border-outline-variant rounded-lg"></div>
<div class="w-80 bg-surface-container-lowest border border-outline-variant rounded-lg"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-inverse-surface/40 backdrop-blur-sm p-md">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-lg rounded-[10px] shadow-[0px_4px_12px_rgba(16,60,53,0.08)] border border-outline-variant overflow-hidden flex flex-col">
<!-- Modal Header -->
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-bright">
<div>
<h2 class="font-title-sm text-title-sm text-on-surface">Return Document</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Document ID: #DOC-2023-8492</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-sm rounded-full hover:bg-surface-container focus:outline-none focus:ring-2 focus:ring-secondary">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-lg flex flex-col gap-lg overflow-y-auto max-h-[614px]">
<!-- Action Type Selection (Radio Group) -->
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-sm">ACTION REQUIRED</label>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-sm">
<!-- Request Correction Option -->
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant bg-surface-bright p-md hover:bg-surface-container-low transition-colors">
<input checked="" class="peer sr-only" name="return_action" type="radio" value="correction"/>
<div class="flex w-full items-start gap-sm">
<div class="flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">edit_document</span>
</div>
<div class="flex-1">
<p class="font-body-md text-body-md font-medium text-on-surface peer-checked:text-primary">Request Correction</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Allow author to fix issues and resubmit.</p>
</div>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-secondary pointer-events-none"></div>
</label>
<!-- Mark as Rejected Option -->
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant bg-surface-bright p-md hover:bg-surface-container-low transition-colors">
<input class="peer sr-only" name="return_action" type="radio" value="rejection"/>
<div class="flex w-full items-start gap-sm">
<div class="flex items-center justify-center text-error">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">block</span>
</div>
<div class="flex-1">
<p class="font-body-md text-body-md font-medium text-on-surface peer-checked:text-error">Mark as Rejected</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Terminal decline. Cannot be resubmitted.</p>
</div>
</div>
<div class="absolute inset-0 rounded-lg border-2 border-transparent peer-checked:border-error pointer-events-none"></div>
</label>
</div>
</div>
<div class="h-px bg-outline-variant w-full"></div>
<!-- Reason Category Dropdown -->
<div>
<label class="font-body-sm text-body-sm font-medium text-on-surface block mb-xs" for="reason_category">Reason Category <span class="text-error">*</span></label>
<div class="relative">
<select class="block w-full rounded border border-outline-variant bg-surface-bright px-md py-sm font-body-sm text-body-sm text-on-surface shadow-sm focus:border-secondary focus:ring-1 focus:ring-secondary appearance-none" id="reason_category" name="reason_category">
<option disabled="" selected="" value="">Select a category...</option>
<option value="metadata">Incorrect Metadata</option>
<option value="scan_quality">Poor Scan Quality</option>
<option value="ocr">OCR Issue</option>
<option value="missing_pages">Missing Pages</option>
<option value="copyright">Copyright Concern</option>
<option value="incorrect_category">Incorrect Category</option>
<option value="other">Other</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Detailed Comments Textarea -->
<div>
<label class="font-body-sm text-body-sm font-medium text-on-surface block mb-xs" for="detailed_comments">Detailed Comments <span class="text-error">*</span></label>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-sm">Provide specific instructions for the author to address the issue.</p>
<textarea class="block w-full rounded border border-outline-variant bg-surface-bright px-md py-sm font-body-sm text-body-sm text-on-surface shadow-sm focus:border-secondary focus:ring-1 focus:ring-secondary placeholder:text-on-surface-variant" id="detailed_comments" name="detailed_comments" placeholder="e.g., Pages 12-14 are scanned upside down. Please re-scan and ensure OCR is applied to the new pages." rows="4"></textarea>
</div>
</div>
<!-- Modal Footer (Actions) -->
<div class="px-lg py-md border-t border-outline-variant bg-surface-bright flex justify-end gap-md">
<button class="px-md py-sm rounded font-body-sm text-body-sm font-medium text-secondary border border-secondary hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-1 transition-colors" type="button">
                    Cancel
                </button>
<button class="px-md py-sm rounded font-body-sm text-body-sm font-medium text-on-primary bg-primary-container hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-1 transition-colors flex items-center gap-xs" type="button">
<span>Submit Decision</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</div>
<!-- Vanilla JS for Modal Interactivity (demonstration) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const radioButtons = document.querySelectorAll('input[name="return_action"]');
            const submitBtn = document.querySelector('button.bg-primary-container');
            const submitText = submitBtn.querySelector('span');
            const submitIcon = submitBtn.querySelector('.material-symbols-outlined');

            radioButtons.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'rejection') {
                        submitBtn.classList.remove('bg-primary-container', 'hover:bg-secondary', 'focus:ring-primary-container');
                        submitBtn.classList.add('bg-error', 'hover:bg-error-container', 'hover:text-on-error-container', 'focus:ring-error');
                        submitText.textContent = 'Confirm Rejection';
                        submitIcon.textContent = 'block';
                    } else {
                        submitBtn.classList.add('bg-primary-container', 'hover:bg-secondary', 'focus:ring-primary-container');
                        submitBtn.classList.remove('bg-error', 'hover:bg-error-container', 'hover:text-on-error-container', 'focus:ring-error');
                        submitText.textContent = 'Submit Decision';
                        submitIcon.textContent = 'send';
                    }
                });
            });
        });
    </script>
</body></html>
