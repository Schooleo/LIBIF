<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&amp;display=swap" rel="stylesheet"/>

<style>
        body {
            background-color: #F7F9F8;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        
        .auth-card {
            background-color: #FFFFFF;
            border: 1px solid #D9E1DE;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(16, 60, 53, 0.08);
        }

        .input-field {
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            padding: 8px 12px;
            transition: all 0.2s ease-in-out;
        }

        .input-field:focus {
            outline: none;
            border-color: #0C6668;
            box-shadow: 0 0 0 2px #E8F3F2;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-md">
<!-- Auth Container -->
<div class="w-full max-w-[400px]">
<!-- Logo Header -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary">LIBIF</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-sm">Digital Library System</p>
</div>
<!-- Auth Card -->
<div class="auth-card p-xl mb-lg">
<h2 class="font-headline-md text-headline-md text-primary mb-md text-center">Sign In</h2>
<form action="#" class="space-y-md" method="POST">
<!-- Email/Username Field -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface mb-xs" for="username">
                        Email / Username (Email / Tên đăng nhập)
                    </label>
<div class="relative">
<input class="input-field w-full font-body-md text-body-md text-on-surface bg-surface-lowest placeholder:text-outline-variant pl-10" id="username" name="username" placeholder="user@university.edu" required="" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">
                            person
                        </span>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface mb-xs" for="password">
                        Password (Mật khẩu)
                    </label>
<div class="relative">
<input class="input-field w-full font-body-md text-body-md text-on-surface bg-surface-lowest placeholder:text-outline-variant pl-10 pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">
                            lock
                        </span>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="toggle-icon" style="font-size: 20px;">
                                visibility_off
                            </span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between mt-sm">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary-container focus:ring-primary-container focus:ring-2 focus:ring-offset-1 focus:ring-offset-surface-lowest transition-all" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-body-sm text-secondary hover:text-secondary-container transition-colors hover:underline" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary font-body-md text-body-md py-sm rounded hover:bg-[#138A8A] transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-[#138A8A] outline-none" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Register Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Need access? <a class="text-secondary hover:text-secondary-container hover:underline transition-colors font-semibold" href="#">Register for a Reader account</a>
</p>
</div>
</div>
<!-- Institutional Footer -->
<div class="text-center">
<span class="material-symbols-outlined text-outline mb-xs" style="font-size: 24px;">
                account_balance
            </span>
<p class="font-label-caps text-label-caps text-on-surface-variant">
                Authorized access for university members and registered researchers.
            </p>
</div>
</div>
<!-- JavaScript for micro-interactions -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
