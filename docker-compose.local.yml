name: libif-local

x-api-environment: &api-environment
  NODE_ENV: development
  DATABASE_URL: postgresql://library:library@postgres:5432/libif?schema=public
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: libif-pdfs
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  LIBIF_WEB_BASE_URL: http://libif.local.com
  LIBIF_ENABLE_DEV_AUTH: "false"
  LIBIF_ALLOW_IN_MEMORY_READER_LIMITS: "false"
  LIBIF_TRUST_PROXY: "true"
  LIBIF_SOURCE_ACCESS_TOKEN_SECRET: local-compose-source-access-token
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_SECURE: ${SMTP_SECURE:-starttls}
  API_PORT: "3001"

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: libif
    volumes:
      - local_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d libif"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.8.0-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - local_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: build
    command: npx prisma migrate deploy --config apps/api/prisma.config.ts
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: build
    working_dir: /app/apps/api
    command: npx tsx prisma/seed.ts
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment: *api-environment
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: node apps/api/dist/src/worker.main.js
    environment: *api-environment
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://libif.local.com
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://libif.local.com
      INTERNAL_API_BASE_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  tailscale:
    image: tailscale/tailscale:v1.98.9
    hostname: ${TAILSCALE_HOSTNAME:-libif-demo}
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY:-}
      TS_AUTH_ONCE: "true"
      TS_ACCEPT_DNS: "false"
      TS_HOSTNAME: ${TAILSCALE_HOSTNAME:-libif-demo}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ./tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  nginx:
    image: nginx:1.29.1-alpine
    network_mode: service:tailscale
    volumes:
      - ./docker/nginx/local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      tailscale:
        condition: service_started
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  local_postgres_data:
  local_minio_data:

networks:
  default:
    name: libif-local-network
