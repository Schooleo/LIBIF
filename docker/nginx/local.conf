events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream libif_api {
    server api:3001;
  }

  upstream libif_web {
    server web:3000;
  }

  # Reject direct-IP and unexpected Host-header requests. The only published
  # listener is bound to 127.0.0.1, so application services stay private.
  server {
    listen 80 default_server;
    server_name _;
    return 444;
  }

  server {
    listen 80;
    server_name libif.local.com;
    client_max_body_size 50m;

    location /api/ {
      proxy_pass http://libif_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://libif_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
