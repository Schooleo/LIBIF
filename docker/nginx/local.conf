events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Compose recreates application containers during local builds. Resolve their
  # service names through Docker DNS at request time instead of retaining a
  # startup-time container IP in an upstream block.
  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 5s;

  # Reject direct-IP and unexpected Host-header requests. The only published
  # listener is bound to 127.0.0.1, so application services stay private.
  server {
    listen 80 default_server;
    server_name _;
    return 444;
  }

  server {
    listen 80;
    server_name libif.local.com;
    client_max_body_size 50m;

    location /api/ {
      set $api_upstream api:3001;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      set $web_upstream web:3000;
      proxy_pass http://$web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
